# Kamal deployment configuration for stocknify-api
# Docs: https://kamal-deploy.org

service: stocknify-api
image: thedigitalviking/stocknify-api

servers:
  web:
    hosts:
      - 178.104.175.191
    labels:
      traefik.http.routers.stocknify-api.rule: Host(`api.stocknify.app`)
      traefik.http.routers.stocknify-api.tls: "true"
      traefik.http.routers.stocknify-api.tls.certresolver: letsencrypt

builder:
  arch: amd64
  remote: false
  dockerfile: apps/api/Dockerfile
  context: .

registry:
  server: ghcr.io
  username: thedigitalviking
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    PORT: "3001"
    NODE_ENV: production
  secret:
    - DATABASE_URL
    - DIRECT_URL
    - SUPABASE_URL
    - SUPABASE_SERVICE_ROLE_KEY
    - SUPABASE_JWT_SECRET
    - SUPABASE_WEBHOOK_SECRET
    - REDIS_URL
    - CREDENTIALS_ENCRYPTION_KEY
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - RESEND_API_KEY
    - FROM_EMAIL
    - SENTRY_DSN

proxy:
  ssl: true
  host: api.stocknify.app
  app_port: 3001
  healthcheck:
    path: /v1/health
    interval: 3
    timeout: 10
