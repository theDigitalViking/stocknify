name: Deploy

on:
  push:
    branches: [main]

# Only run one deploy at a time; cancel in-progress runs if a new push lands
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Require CI to pass before deploying
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: 'Type check · Lint · Test · Build'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  # ──────────────────────────────────────────────
  # Manual approval gate before production deploy
  # ──────────────────────────────────────────────
  approve:
    name: Await production approval
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment:
      name: production
      # Configure required reviewers in: Settings → Environments → production
    steps:
      - name: Approved
        run: echo "Production deployment approved"

  # ──────────────────────────────────────────────
  # Deploy web to Vercel
  # ──────────────────────────────────────────────
  deploy-web:
    name: Deploy web → Vercel
    needs: approve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        working-directory: apps/web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        working-directory: apps/web
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────
  # Build and push Docker image, then deploy via Kamal
  # ──────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Hetzner via Kamal
    needs: approve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stocknify-api:latest
            ghcr.io/${{ github.repository_owner }}/stocknify-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Ruby for Kamal
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.KAMAL_SSH_KEY }}

      - name: Deploy via Kamal
        run: kamal deploy
        working-directory: .
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          # Production env vars are loaded from .env on the server by Kamal
