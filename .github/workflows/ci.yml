name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Skip env validation during CI since real secrets are not present
  SKIP_ENV_VALIDATION: 'true'
  # Dummy vars to satisfy config.ts at import time (typecheck only)
  NODE_ENV: test

jobs:
  ci:
    name: Type check · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api db:generate

      - name: Type check
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build
        env:
          # Provide stub values so @t3-oss/env-nextjs doesn't fail during build
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          NEXT_PUBLIC_API_URL: https://api.stocknify.app
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
